<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proteção Veicular</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: #fff;
}

/* ANIMAÇÃO */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  transition: 0.8s;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  align-items: center;
}

.logo {
  height: 45px;
}

.profile img {
  width: 45px;
  border-radius: 50%;
  border: 2px solid #22c55e;
}

/* HERO */
.container {
  text-align: center;
  padding: 20px;
}

.hero-img img {
  width: 140px;
  border-radius: 50%;
  box-shadow: 0 0 30px #22c55e;
}

h1 {
  font-size: 28px;
}

.highlight {
  color: #22c55e;
}

/* BOTÃO */
.btn {
  background: linear-gradient(45deg, #22c55e, #16a34a);
  padding: 16px 28px;
  border-radius: 12px;
  color: white;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.08);
}

/* CARDS */
.section {
  margin-top: 40px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

/* CONTADOR */
.counter {
  font-size: 30px;
  color: #22c55e;
}

/* WHATSAPP FIXO */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  padding: 15px;
  border-radius: 50%;
  font-size: 22px;
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.jpg" class="logo">
  <div class="profile">
    <img src="sua-foto.jpg">
  </div>
</div>

<div class="container">

<div class="hero-img fade-in">
  <img src="sua-foto.jpg">
</div>

<h1 class="fade-in">Proteja seu veículo com <span class="highlight">segurança e economia</span> 🚗</h1>

<p class="fade-in">Sem burocracia e com assistência 24h</p>

<a class="btn fade-in" href="https://wa.me/557597142719?text=Quero%20simular">
Simular agora
</a>

<div class="section fade-in">
<h2>Clientes protegidos</h2>
<div class="counter" id="counter">0</div>
</div>

<div class="section fade-in">
<h2>Vantagens</h2>
<div class="card">✔ Sem análise de perfil</div>
<div class="card">✔ Assistência 24h</div>
<div class="card">✔ Roubo e furto</div>
</div>

<div class="section fade-in">
<h2>Oferta termina em:</h2>
<p id="timer"></p>
</div>

</div>

<a class="whatsapp" href="https://wa.me/557597142719">💬</a>

<script>
// ANIMAÇÃO AO ROLAR
const elements = document.querySelectorAll('.fade-in');
window.addEventListener('scroll', () => {
  elements.forEach(el => {
    const pos = el.getBoundingClientRect().top;
    if (pos < window.innerHeight - 50) {
      el.classList.add('show');
    }
  });
});

// CONTADOR
let count = 0;
let target = 127;
let interval = setInterval(() => {
  count++;
  document.getElementById("counter").innerText = count;
  if (count >= target) clearInterval(interval);
}, 20);

// TIMER (URGÊNCIA)
let time = 600;
setInterval(() => {
  let min = Math.floor(time / 60);
  let sec = time % 60;
  document.getElementById("timer").innerText =
    min + "m " + sec + "s";
  time--;
}, 1000);
</script>

</body>
</html>
